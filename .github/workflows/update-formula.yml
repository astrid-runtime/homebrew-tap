name: Update Formula

on:
  repository_dispatch:
    types: [release]

permissions:
  contents: write

jobs:
  update:
    name: Update astrid formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Download and verify release checksum manifest
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi

          echo "Updating formula to v${VERSION}"
          mkdir -p artifacts

          REPOSITORY="astrid-runtime/astrid"
          TAG="v${VERSION}"
          CERTIFICATE_IDENTITY="https://github.com/${REPOSITORY}/.github/workflows/release.yml@refs/tags/${TAG}"
          OIDC_ISSUER="https://token.actions.githubusercontent.com"
          gh release download "$TAG" \
            --repo "$REPOSITORY" \
            --pattern SHA256SUMS.txt \
            --pattern SHA256SUMS.txt.sigstore.json \
            --dir artifacts

          test -s artifacts/SHA256SUMS.txt
          test -s artifacts/SHA256SUMS.txt.sigstore.json
          cosign verify-blob \
            --bundle artifacts/SHA256SUMS.txt.sigstore.json \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer "$OIDC_ISSUER" \
            artifacts/SHA256SUMS.txt

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          checksum_for() {
            local asset="$1"
            local matches
            matches=$(awk -v asset="$asset" '$2 == asset { print $1 }' artifacts/SHA256SUMS.txt)
            if [ "$(printf '%s\n' "$matches" | sed '/^$/d' | wc -l)" -ne 1 ] \
              || [[ ! "$matches" =~ ^[0-9a-f]{64}$ ]]; then
              echo "Expected exactly one lowercase SHA-256 entry for $asset" >&2
              exit 1
            fi
            printf '%s' "$matches"
          }

          SHA_ARM_MAC=$(checksum_for "astrid-${VERSION}-aarch64-apple-darwin.tar.gz")
          SHA_X86_MAC=$(checksum_for "astrid-${VERSION}-x86_64-apple-darwin.tar.gz")
          SHA_ARM_LINUX=$(checksum_for "astrid-${VERSION}-aarch64-unknown-linux-gnu.tar.gz")
          SHA_X86_LINUX=$(checksum_for "astrid-${VERSION}-x86_64-unknown-linux-gnu.tar.gz")

          cat > Formula/astrid.rb << FORMULA
          class Astrid < Formula
            desc "Microkernel for AI agents where agents write their own harness"
            homepage "https://github.com/astrid-runtime/astrid"
            version "${VERSION}"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/astrid-runtime/astrid/releases/download/v#{version}/astrid-#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM_MAC}"
              else
                url "https://github.com/astrid-runtime/astrid/releases/download/v#{version}/astrid-#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_MAC}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/astrid-runtime/astrid/releases/download/v#{version}/astrid-#{version}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_ARM_LINUX}"
              else
                url "https://github.com/astrid-runtime/astrid/releases/download/v#{version}/astrid-#{version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_LINUX}"
              end
            end

            def install
              bin.install "astrid"
              bin.install "astrid-daemon"
              bin.install "astrid-build"
              bin.install "astrid-emit"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/astrid --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' Formula/astrid.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/astrid.rb
          # Re-dispatches for an already-published version regenerate an
          # identical formula; a bare `git commit` would exit 1 on the
          # empty diff and fail the run.
          if git diff --cached --quiet; then
            echo "Formula unchanged (re-dispatch for v${VERSION}); nothing to commit."
            exit 0
          fi
          git commit -m "chore: bump astrid to v${VERSION}"
          git push
        env:
          VERSION: ${{ github.event.client_payload.version }}
