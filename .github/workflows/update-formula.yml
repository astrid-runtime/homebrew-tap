name: Update Formula

on:
  repository_dispatch:
    types: [release]

permissions:
  contents: write
  actions: write

jobs:
  update:
    name: Update astrid formula
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Download and verify release checksum manifest
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          scripts/validate-version.sh "$VERSION"

          echo "Updating formula to v${VERSION}"
          mkdir -p artifacts

          REPOSITORY="astrid-runtime/astrid"
          TAG="v${VERSION}"
          CERTIFICATE_IDENTITY="https://github.com/${REPOSITORY}/.github/workflows/release.yml@refs/tags/${TAG}"
          OIDC_ISSUER="https://token.actions.githubusercontent.com"
          gh release download "$TAG" \
            --repo "$REPOSITORY" \
            --pattern SHA256SUMS.txt \
            --pattern SHA256SUMS.txt.sigstore.json \
            --dir artifacts

          test -s artifacts/SHA256SUMS.txt
          test -s artifacts/SHA256SUMS.txt.sigstore.json
          cosign verify-blob \
            --bundle artifacts/SHA256SUMS.txt.sigstore.json \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer "$OIDC_ISSUER" \
            artifacts/SHA256SUMS.txt

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          scripts/generate-formula.sh \
            "$VERSION" \
            artifacts/SHA256SUMS.txt \
            Formula/astrid.rb

      - name: Validate generated formula with Homebrew
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          tap=astrid-release-generated/tap
          cleanup() {
            brew untap "$tap" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          ruby -c Formula/astrid.rb
          brew style Formula/astrid.rb
          brew untap "$tap" >/dev/null 2>&1 || true
          brew tap-new --no-git "$tap" >/dev/null
          cp Formula/astrid.rb "$(brew --repository "$tap")/Formula/astrid.rb"

          actual_version=$(
            brew info --json=v2 "$tap/astrid" |
              ruby -rjson -e 'puts JSON.parse(STDIN.read).fetch("formulae").first.fetch("versions").fetch("stable")'
          )
          if [[ "$actual_version" != "$VERSION" ]]; then
            echo "::error::Homebrew inferred version '$actual_version'; expected '$VERSION'." >&2
            exit 1
          fi
          brew audit --strict "$tap/astrid"

      - name: Detect formula change
        id: formula
        run: |
          if git diff --quiet -- Formula/astrid.rb; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Formula unchanged (re-dispatch for v${VERSION}); nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERSION: ${{ github.event.client_payload.version }}

      - name: Publish verified formula commit
        if: steps.formula.outputs.changed == 'true'
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          scripts/create-signed-commit-payload.sh \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_SHA" \
            "$VERSION" \
            Formula/astrid.rb > "$RUNNER_TEMP/commit-formula.json"
          gh api graphql --input "$RUNNER_TEMP/commit-formula.json" \
            > "$RUNNER_TEMP/commit-formula-response.json"
          oid=$(jq -er '
            .data.createCommitOnBranch.commit
            | select(.signature.isValid == true and .signature.wasSignedByGitHub == true)
            | .oid
          ' "$RUNNER_TEMP/commit-formula-response.json")
          url=$(jq -er '.data.createCommitOnBranch.commit.url' \
            "$RUNNER_TEMP/commit-formula-response.json")
          echo "sha=$oid" >> "$GITHUB_OUTPUT"
          echo "Published verified commit $oid: $url"

      - name: Validate published main
        if: steps.formula.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ steps.publish.outputs.sha }}
        run: |
          gh workflow run ci.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f expected_sha="$EXPECTED_SHA"

          run_id=
          for _ in {1..30}; do
            run_id=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --event workflow_dispatch \
              --commit "$EXPECTED_SHA" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            [[ -n "$run_id" ]] && break
            sleep 2
          done
          [[ -n "$run_id" ]]
          gh run watch "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --interval 10 \
            --exit-status
