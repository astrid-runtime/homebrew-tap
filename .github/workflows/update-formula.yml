name: Update Formula

on:
  repository_dispatch:
    types: [release]

permissions:
  contents: write

jobs:
  update:
    name: Update astrid formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Download and verify release checksum manifest
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          scripts/validate-version.sh "$VERSION"

          echo "Updating formula to v${VERSION}"
          mkdir -p artifacts

          REPOSITORY="astrid-runtime/astrid"
          TAG="v${VERSION}"
          CERTIFICATE_IDENTITY="https://github.com/${REPOSITORY}/.github/workflows/release.yml@refs/tags/${TAG}"
          OIDC_ISSUER="https://token.actions.githubusercontent.com"
          gh release download "$TAG" \
            --repo "$REPOSITORY" \
            --pattern SHA256SUMS.txt \
            --pattern SHA256SUMS.txt.sigstore.json \
            --dir artifacts

          test -s artifacts/SHA256SUMS.txt
          test -s artifacts/SHA256SUMS.txt.sigstore.json
          cosign verify-blob \
            --bundle artifacts/SHA256SUMS.txt.sigstore.json \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer "$OIDC_ISSUER" \
            artifacts/SHA256SUMS.txt

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          scripts/generate-formula.sh \
            "$VERSION" \
            artifacts/SHA256SUMS.txt \
            Formula/astrid.rb

      - name: Detect formula change
        id: formula
        run: |
          if git diff --quiet -- Formula/astrid.rb; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Formula unchanged (re-dispatch for v${VERSION}); nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERSION: ${{ github.event.client_payload.version }}

      - name: Publish verified formula commit
        if: steps.formula.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          scripts/create-signed-commit-payload.sh \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_SHA" \
            "$VERSION" \
            Formula/astrid.rb > "$RUNNER_TEMP/commit-formula.json"
          gh api graphql --input "$RUNNER_TEMP/commit-formula.json" \
            > "$RUNNER_TEMP/commit-formula-response.json"
          jq -er '
            .data.createCommitOnBranch.commit
            | select(.signature.isValid == true and .signature.wasSignedByGitHub == true)
            | .oid
          ' "$RUNNER_TEMP/commit-formula-response.json"
